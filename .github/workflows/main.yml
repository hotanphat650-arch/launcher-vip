name: Build APK Windows (Release Version)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Setup Android SDK + NDK r16b
      - name: Set up Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platforms;android-33
            build-tools;33.0.2
            ndk;16.1.4479499
            cmake;3.10.2.4988404
          cmdline-tools-version: 12266719
          accept-android-sdk-licenses: true

      # 4. Enable long paths
      - name: Enable long paths
        shell: powershell
        run: |
          git config --system core.longpaths true
          reg add "HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f

      # 5. Show SDK + NDK info
      - name: Show Android SDK info
        shell: cmd
        run: |
          echo ANDROID_SDK_ROOT=%ANDROID_SDK_ROOT%
          echo.
          echo ===== INSTALLED NDKS =====
          dir "%ANDROID_SDK_ROOT%\ndk"

      # 6. Build libsamp.so
      - name: Build libsamp.so
        shell: cmd
        run: |
          set NDK_PATH=%ANDROID_SDK_ROOT%\ndk\16.1.4479499

          echo.
          echo ===== USING NDK =====
          echo %NDK_PATH%

          if not exist "%NDK_PATH%\ndk-build.cmd" (
            echo ERROR: ndk-build.cmd not found
            exit /b 1
          )

          echo.
          echo ===== PROJECT FILES =====
          dir

          echo.
          echo ===== ENTER JNI FOLDER =====

          if exist "app\jni" (
            cd app\jni
          ) else (
            if exist "app\src\main\jni" (
              cd app\src\main\jni
            ) else (
              echo ERROR: JNI folder not found
              exit /b 1
            )
          )

          echo Current Directory:
          cd

          echo.
          echo ===== START NDK BUILD =====

          call "%NDK_PATH%\ndk-build.cmd" ^
            NDK_PROJECT_PATH=. ^
            APP_BUILD_SCRIPT=Android.mk ^
            NDK_APPLICATION_MK=Application.mk ^
            APP_ABI=armeabi-v7a ^
            NDK_OUT=build\obj ^
            NDK_LIBS_OUT=build\libs

      # 7. Copy libsamp.so
      - name: Copy libsamp.so
        shell: powershell
        run: |
          $source1 = "app/jni/build/libs/armeabi-v7a/libsamp.so"
          $source2 = "app/src/main/jni/build/libs/armeabi-v7a/libsamp.so"

          $dest = "app/src/main/jniLibs/armeabi-v7a"

          New-Item -ItemType Directory -Force -Path $dest

          if (Test-Path $source1) {
              Copy-Item $source1 "$dest/libsamp.so" -Force
              Write-Host "Copied from source1"
          }
          elseif (Test-Path $source2) {
              Copy-Item $source2 "$dest/libsamp.so" -Force
              Write-Host "Copied from source2"
          }
          else {
              Write-Host "libsamp.so not found"
              exit 1
          }

      # 8. Verify copied library
      - name: Verify libs
        shell: cmd
        run: |
          dir "app\src\main\jniLibs\armeabi-v7a"

      # 9. Grant gradlew permission
      - name: Prepare Gradle
        shell: cmd
        run: |
          if exist gradlew.bat (
            echo gradlew exists
          ) else (
            echo ERROR: gradlew.bat not found
            exit /b 1
          )

      # 10. Build APK
      - name: Build Debug APK
        shell: cmd
        run: |
          call gradlew.bat assembleDebug --stacktrace

      # 11. Verify APK
      - name: Verify APK
        shell: cmd
        run: |
          dir "app\build\outputs\apk\debug"

      # 12. Upload APK artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      # 13. Upload to GitHub Release
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          tag_name: build-${{ github.run_number }}
          name: Debug Build v${{ github.run_number }}
          body: |
            Latest build from branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
