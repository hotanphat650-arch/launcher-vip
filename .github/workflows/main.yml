name: Build APK Windows (Release Version)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:

      # 1. CHECKOUT
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. JAVA
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # 3. ANDROID SDK + NDK
      - name: Set up Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platform-tools
            platforms;android-34
            build-tools;34.0.0
            ndk;16.1.4479499
            cmake;3.10.2.4988404
          cmdline-tools-version: 12266719
          accept-android-sdk-licenses: true

      # 4. ENABLE LONG PATHS
      - name: Enable Windows long paths
        shell: powershell
        run: |
          git config --system core.longpaths true
          reg add "HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f

      # 5. SHOW SDK INFO
      - name: Show Android SDK info
        shell: cmd
        run: |
          echo ===== ANDROID SDK ROOT =====
          echo %ANDROID_SDK_ROOT%

      # 6. PATCH APPLICATION.MK
      - name: Patch Application.mk
        shell: powershell
        run: |
          $mk = @"
          APP_ABI := armeabi-v7a
          APP_PLATFORM := android-21
          APP_STL := c++_static
          APP_CPPFLAGS := -std=c++17
          APP_MODULES := samp
          "@
          Set-Content -Path "client/jni/Application.mk" -Value $mk

      # 7. PATCH ANDROID.MK
      - name: Patch Android.mk
        shell: powershell
        run: |
          $file = "client/jni/Android.mk"
          $content = Get-Content $file -Raw
          if ($content -notmatch "LOCAL_CPPFLAGS \+= -std=c\+\+17") {
              $content = $content -replace "include \$\(CLEAR_VARS\)", "include `$(CLEAR_VARS)`r`nLOCAL_CPPFLAGS += -std=c++17`r`nLOCAL_LDLIBS += -latomic"
          }
          Set-Content $file $content

      # 8. BUILD LIBSAMP.SO
      - name: Build libsamp.so
        shell: cmd
        run: |
          set NDK_PATH=%ANDROID_SDK_ROOT%\ndk\16.1.4479499
          cd client\jni
          call "%NDK_PATH%\ndk-build.cmd" ^
            NDK_PROJECT_PATH=. ^
            NDK_APPLICATION_MK=Application.mk ^
            APP_BUILD_SCRIPT=Android.mk ^
            APP_ABI=armeabi-v7a
          if errorlevel 1 exit /b 1

      # 9. VERIFY LIBSAMP.SO
      - name: Verify libsamp.so
        shell: cmd
        run: |
          if exist "client\libs\armeabi-v7a\libsamp.so" ( echo libsamp.so FOUND ) else ( echo ERROR: libsamp.so NOT FOUND & exit /b 1 )

      # 10. VERIFY GRADLE
      - name: Verify Gradle
        shell: cmd
        run: |
          if exist gradlew.bat ( echo gradlew.bat FOUND ) else ( echo ERROR: gradlew.bat missing & exit /b 1 )

      # 11. SHOW GRADLE VERSION
      - name: Show Gradle Version
        shell: cmd
        run: call gradlew.bat --version

      # 12. CLEAN PROJECT
      - name: Clean Project
        shell: cmd
        run: call gradlew.bat clean

      # 13. BUILD APK
      - name: Build Debug APK
        shell: cmd
        run: |
          call gradlew.bat assembleDebug --stacktrace --warning-mode all
          if errorlevel 1 exit /b 1

      # 14. LOCATE APK
      - name: Locate APK
        shell: powershell
        run: |
          $apk = Get-ChildItem -Path "app/build/outputs/apk" -Recurse -Filter *.apk | Sort-Object Length -Descending | Select-Object -First 1
          if ($apk) {
              echo "APK_PATH=$($apk.FullName)" >> $env:GITHUB_ENV
          } else {
              exit 1
          }

      # 15. VERIFY APK CONTENTS
      - name: Verify APK Contents
        shell: powershell
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($env:APK_PATH)
          $found = $false
          foreach ($entry in $zip.Entries) { if ($entry.FullName -like "*libsamp.so") { $found = $true } }
          $zip.Dispose()
          if (-not $found) { Write-Host "ERROR: libsamp.so NOT INSIDE APK"; exit 1 }

      # 16. UPLOAD ARTIFACT (APK)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SA-RP-Assets
          path: ${{ env.APK_PATH }}

      # 17. CREATE RELEASE
      - name: Upload Files to Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: ${{ env.APK_PATH }}
          tag_name: build-${{ github.run_number }}
          name: SA-RP Build v${{ github.run_number }}
          body: |
            Tự động build bản phát hành mới.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
